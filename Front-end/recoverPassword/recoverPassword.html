<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTask - Recuperar Senha</title>

    <link rel="stylesheet" href="recoverPassword.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>


    <div class="recover-container">

        <div class="recover-left">
            <div class="logo">
                <i class="fa-solid fa-circle-check"></i>
                <h1>FocusTask</h1>
            </div>

            <h2>Recupere sua conta</h2>

            <p>
                Digite seu email para receber um código de verificação.
            </p>

        </div>

        <div class="recover-right">

            <div class="recover-box">

                <h2>Recuperar Senha</h2>

                <p>Informe seu email 📩</p>

                <form>

                    <label>Email</label>

                    <input type="email" id="email" placeholder="Digite seu email" required>

                    <button id="send-code-btn">
                        <span id="btn-text">Enviar Código</span>
                        <span id="spinner" class="spinner hidden"></span>
                    </button>

                </form>

                <div class="extra">
                    <a href="../login/login.html">
                        Voltar para Login
                    </a>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="recoverPassword.js"></script>

</body>

</html>
