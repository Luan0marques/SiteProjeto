<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FocusTask - Cadastro</title>

  <link rel="stylesheet" href="register.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="register.css">
</head>

<body>

  <!-- Container de Alertas/Toasts -->
  <div id="toast-container"></div>

  <!-- Container Principal do Registro (Com animação de entrada) -->
  <div class="register-container">

    <!-- LADO ESQUERDO (Branding) -->
    <div class="register-left">
      <div class="logo">
        <i class="fa-solid fa-circle-check"></i>
        <h1>FocusTask</h1>
      </div>
      <h2>Crie sua conta e organize sua rotina</h2>
      <p>
        Comece a melhorar sua produtividade hoje mesmo e acompanhe suas tarefas de forma simples.
      </p>
    </div>

    <!-- LADO DIREITO (Formulário) -->
    <div class="register-right">
      <div class="register-box">
        <h2>Criar conta</h2>
        <p>Comece agora 🚀</p>

        <form>
          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome" required id="name"/>

          <label>Email</label>
          <input type="email" placeholder="Digite seu email" required id="email"/>

          <label>Senha</label>
          <input type="password" placeholder="Crie uma senha" required id="password"/>

          <label>Confirmar senha</label>
          <input type="password" placeholder="Confirme sua senha" required id="confirmPassword"/>

          <button id="btn-action">Criar conta</button>
        </form>

        <div class="extra">
          <p>Já tem conta? <a id="log-in" style="cursor: pointer;">Entrar</a></p>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="register.js"></script>
</body>
</html>
