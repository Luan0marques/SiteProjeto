<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FocusTask - Cadastro</title>

  <link rel="stylesheet" href="register.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="TelaCadastro.css">
</head>

<body>

  <div class="register-container">

    <!-- LADO ESQUERDO -->
    <div class="register-left">

      <div class="logo">
        <i class="fa-solid fa-circle-check"></i>
        <h1>FocusTask</h1>
      </div>

      <h2>Crie sua conta e organize sua rotina</h2>

      <p>
        Comece a melhorar sua produtividade hoje mesmo e acompanhe suas tarefas de forma simples.
      </p>

    </div>

    <!-- LADO DIREITO -->
    <div class="register-right">

      <div class="register-box">

        <h2>Criar conta</h2>
        <p>Comece agora 🚀</p>

        <form>

          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome" required id="name"/>

          <label>Email</label>
          <input type="email" placeholder="Digite seu email" required id="email"/>

          <label>Senha</label>
          <input type="password" placeholder="Crie uma senha" required id="password"/>

          <label>Confirmar senha</label>
          <input type="password" placeholder="Confirme sua senha" required id="confirmPassword"/>

          <button id="btn-action">Criar conta</button>

        </form>

        <div class="extra">
          <p>Já tem conta? <a href="login.html">Entrar</a></p>
        </div>

      </div>

    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="cadastro.js"></script>
</body>
</html>
